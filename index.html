.mode-card.cat { border-color: var(--cat-p); }
.mode-card.exotic { border-color: var(--exo-p); }
.mode-card h2 { font-size: 2.5rem; margin: 0; }
.question { font-size: 19px; font-weight: bold; margin-bottom: 20px; color: var(--accent); line-height: 1.5; }
.option { background: var(--card-bg); padding: 14px 18px; border-radius: 16px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; border: 1.5px solid transparent; font-size: 14px; }
.option:hover { transform: translateX(5px); background: rgba(255, 255, 255, 0.2); }
.selected { border-color: var(--dog-p); background: rgba(255, 133, 161, 0.3) !important; }
.cat-mode .selected { border-color: var(--cat-p); background: rgba(167, 139, 250, 0.3) !important; }
.exotic-mode .selected { border-color: var(--exo-p); background: rgba(74, 222, 128, 0.3) !important; }
.card { background: var(--card-bg); padding: 20px; border-radius: 20px; margin-top: 20px; border-left: 6px solid var(--dog-p); backdrop-filter: blur(10px); }
.cat-mode .card { border-left-color: var(--cat-p); }
.exotic-mode .card { border-left-color: var(--exo-p); }
.bar { height: 8px; background: #334155; border-radius: 10px; overflow: hidden; margin: 12px 0; }
.fill { height: 100%; background: linear-gradient(90deg, var(--dog-p), #fb7185); transition: width 1s ease-in-out; }
.cat-mode .fill { background: linear-gradient(90deg, var(--cat-p), #f472b6); }
.exotic-mode .fill { background: linear-gradient(90deg, var(--exo-p), #22c55e); }
button { width: 100%; padding: 18px; border: none; border-radius: 16px; background: linear-gradient(90deg, var(--dog-p), #fb7185); color: white; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 15px rgba(255, 133, 161, 0.3); }
.cat-mode button { background: linear-gradient(90deg, var(--cat-p), #f472b6); }
.exotic-mode button { background: linear-gradient(90deg, var(--exo-p), #22c55e); }
.match-box { background: rgba(255, 222, 235, 0.05); border: 1.2px dashed var(--dog-p); padding: 12px; border-radius: 12px; margin-top: 15px; font-size: 13px; line-height: 1.6; }
.cat-mode .match-box { border-color: var(--cat-p); }
.exotic-mode .match-box { border-color: var(--exo-p); }
.wish-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 320px; overflow-y: auto; padding-right: 5px; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: var(--dog-p); border-radius: 10px; }

let mode = ""; 
let step = -1;
let user = { personalityPriority: [], wishlist: "" };
const TOTAL_STEPS = questions.length + 2;

function render() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  const container = document.createElement('div');
  let modeClass = mode === "dog" ? "dog-mode" : mode === "cat" ? "cat-mode" : "exotic-mode";
  container.className = 'fade-in ' + modeClass;

  if (step === -1) {
    container.innerHTML = `
      <div class="intro-page">
        <h1>🐾 내 운명의 펫 찾기</h1>
        <p>너의 운명은 강아지? 고양이? 아니면 이색동물?<br>정밀 분석으로 운명 펫을 찾아줄게! ✨</p>
        <div class="mode-selection">
          <div class="mode-card dog" onclick="start('dog')"><h2>🐶</h2><b>강아지 찾기</b></div>
          <div class="mode-card cat" onclick="start('cat')"><h2>🐱</h2><b>고양이 찾기</b></div>
          <div class="mode-card exotic" onclick="start('exotic')"><h2>🦎</h2><b>이색동물 찾기</b></div>
        </div>
      </div>`;
  } else if (step < questions.length) {
    let q = questions[step];
    container.innerHTML = `<div class="question"><span style="font-size:13px; opacity:0.8;">STEP ${step+1}/${TOTAL_STEPS}</span><br>${q.text}</div>`;
    q.options.forEach(o => { 
        const isSelected = user[q.key] === o.v ? 'selected' : '';
        container.innerHTML += `<div class="option ${isSelected}" onclick='select("${o.v}")'>${o.t}</div>`; 
    });
  } else if (step === questions.length) {
    container.innerHTML = `<div class="question"><span style="font-size:13px; opacity:0.8;">STEP 11/12</span><br>💖 중요하게 생각하는 특징 3가지 골라줘!</div>`;
    let personalities = [];
    if(mode === "dog") personalities = [{v: "affectionate", t: "애교 ❤️"}, {v: "playful", t: "장난 😆"}, {v: "calm", t: "차분 😌"}, {v: "independent", t: "독립 🐺"}];
    else if(mode === "cat") personalities = [{v: "sociability", t: "사교성 ❤️"}, {v: "activity", t: "활동성 😆"}, {v: "grooming", t: "털관리 🧹"}, {v: "difficulty", t: "수다 🗣️"}];
    else personalities = [{v: "cute", t: "귀여움 🍬"}, {v: "cool", t: "멋있음 🕶️"}, {v: "calm", t: "조용함 😌"}, {v: "smart", t: "똑똑함 🎓"}];
    
    personalities.forEach(p => {
      const idx = user.personalityPriority.indexOf(p.v);
      container.innerHTML += `<div class="option ${idx !== -1 ? 'selected' : ''}" onclick='togglePriority("${p.v}")'>${idx !== -1 ? (idx+1)+'. ' : ''}${p.t}</div>`;
    });
    container.innerHTML += `<button onclick="nextStep()" ${user.personalityPriority.length < 3 ? 'disabled style="opacity:0.5"' : ''}>다음 단계 ✨</button>`;
  } else if (step === questions.length + 1) {
    let modeText = mode === "dog" ? "강아지" : mode === "cat" ? "고양이" : "이색동물";
    container.innerHTML = `<div class="question"><span style="font-size:13px; opacity:0.8;">STEP 12/12</span><br>⭐ 찜해뒀던 ${modeText}는 누구야?</div><div class="wish-grid">`;
    let currentData = mode === "dog" ? dogData : mode === "cat" ? catData : exoticData;
    currentData.forEach(d => {
      container.innerHTML += `<div class="option wish-item ${user.wishlist === d.name ? 'selected' : ''}" onclick='selectWish("${d.name}")'>${d.name}</div>`;
    });
    container.innerHTML += `</div><button onclick="nextStep()" ${!user.wishlist ? 'disabled style="opacity:0.5"' : ''}>결과 분석하기 🌈</button>`;
  } else { calcResult(container); }
  content.appendChild(container);
}

function start(m) { mode = m; step = 0; render(); }
function nextStep() { step++; render(); }
function select(v) { user[questions[step].key] = v; setTimeout(nextStep, 300); }
function selectWish(name) { user.wishlist = name; render(); }
function togglePriority(v) {
  const idx = user.personalityPriority.indexOf(v);
  if (idx !== -1) user.personalityPriority.splice(idx, 1);
  else if (user.personalityPriority.length < 3) user.personalityPriority.push(v);
  render();
}
function restart() { mode = ""; step = -1; user = { personalityPriority: [], wishlist: "" }; render(); }

// [복사하기 필살 로직]
function copyToClipboard(text) {
  const textArea = document.createElement("textarea");
  textArea.value = text;
  textArea.style.position = "fixed";
  textArea.style.left = "-9999px";
  textArea.style.top = "0";
  document.body.appendChild(textArea);
  textArea.focus();
  textArea.select();
  
  try {
    const successful = document.execCommand('copy');
    if(successful) {
      alert("나의 결과가 복사되었어! 친구들에게 카톡으로 자랑해봐! 💌");
    } else {
      alert("복사에 실패했어.. 다시 시도해줄래? 😭");
    }
  } catch (err) {
    alert("오류가 발생했어! 직접 캡쳐해서 공유해줘! 😭");
  }
  document.body.removeChild(textArea);
}

function getScore(d) {
  let s = 50;
  if (user.mbti_ei === "E" && d.activity >= 4) s += 8;
  if (user.mbti_ei === "I" && d.activity <= 2) s += 8;
  if (user.mbti_tf === "F") s += 5;
  if (user.mbti_tf === "T" && d.look === "smart") s += 5;
  if (user.experience === 1 && d.difficulty >= 4) s -= 15;
  if (user.space === "apartment_small") { s -= (d.size === "large" ? 35 : (d.size === "medium" ? 15 : 0)); if (d.activity >= 4) s -= 10; }
  if (user.pref_size === d.size) s += 15;
  if (user.pref_look === d.look) s += 10;
  s -= (Math.abs(user.activity - d.activity) * 6);
  user.personalityPriority.forEach((p, i) => { 
      if (d.personality && d.personality.includes(p)) s += (15 - (i * 5)); 
      if (d[p] && d[p] >= 3) s += (15 - (i * 5));
      if (d.look === p) s += (15 - (i * 5));
  });
  return Math.max(0, Math.min(Math.round(s + (Math.random() * 5)), 100));
}

function getReason(d) {
    let r = [];
    r.push(d.special);
    if (Math.abs(user.activity - d.activity) <= 1) r.push("너랑 에너지가 정말 비슷해서 발맞추기 딱이야!");
    const matched = user.personalityPriority.find(p => (d.personality && d.personality.includes(p)) || (d[p] && d[p] >= 3) || d.look === p);
    if (matched) r.push(`너가 바라던 매력 포인트를 쏙 빼닮았어 ✨`);
    return [...new Set(r)].slice(0, 3).join(' 게다가 ');
}

function calcResult(container) {
  let currentData = mode === "dog" ? dogData : mode === "cat" ? catData : exoticData;
  let res = currentData.map(d => ({ ...d, score: getScore(d) }));
  res.sort((a, b) => b.score - a.score);
  
  // [수정] 공유용 링크 추가 (배포 후 주소로 바꾸면 돼!)
  let myLink = window.location.href;
  let shareText = `[🐾 나의 운명 펫 매칭 결과]\n\n나의 운명 1위는.. ${res[0].name}(${res[0].score}%)! ✨\n2위는 ${res[1].name}, 3위는 ${res[2].name}였어!\n\n너도 궁금하다면 지금 확인해봐! 👇\n${myLink}`;

  container.innerHTML = `<div class="question">💖 너랑 찰떡궁합 리포트야!</div>`;
  res.slice(0, 3).forEach((d, idx) => {
    container.innerHTML += `<div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0">${idx+1}. ${d.name}</h3><span style="font-weight:bold;">${d.score}%</span>
      </div>
      <div class="bar"><div class="fill" style="width:${d.score}%"></div></div>
      <div class="match-box"><b>✨ 왜 너랑 찰떡이냐면!</b><br>${getReason(d)}</div>
    </div>`;
  });
  
  const wish = res.find(d => d.name === user.wishlist);
  if (wish) {
    container.innerHTML += `<div class="card" style="margin-top:25px; border-left-color:var(--accent);">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-size:11px; opacity:0.8;">⭐ 찜했던 결과: ${wish.name}</span>
        <span style="font-weight:bold; color:var(--accent);">${wish.score}%</span>
      </div>
      <div class="bar"><div class="fill" style="width:${wish.score}%"></div></div>
      <div class="match-box">${wish.score >= 85 ? '와! 찜한 친구랑 완전 운명이야 ❤️' : '찜한 친구와는 맞춰갈 시간이 필요해!'}</div>
    </div>`;
  }
  
  const shareBtn = document.createElement("button");
  shareBtn.style.background = "#334155";
  shareBtn.style.boxShadow = "none";
  shareBtn.style.marginTop = "20px";
  shareBtn.innerText = "결과 복사해서 친구에게 자랑하기 💌";
  shareBtn.onclick = function() { copyToClipboard(shareText); };
  container.appendChild(shareBtn);

  const restartBtn = document.createElement("button");
  restartBtn.innerText = "처음으로 돌아가기 🔄";
  restartBtn.onclick = restart;
  container.appendChild(restartBtn);
}
render();
</script>
